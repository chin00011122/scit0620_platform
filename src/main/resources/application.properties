spring.application.name=platform

# 환경변수가 있으면 환경변수를 쓰고, 없으면 로컬 PostgreSQL 기본값을 사용한다.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/platform}
spring.datasource.username=${DB_USERNAME:platform}
spring.datasource.password=${DB_PASSWORD:platform}
spring.datasource.driver-class-name=org.postgresql.Driver

# MVP 개발 중에는 Entity 변경을 DB 스키마에 자동 반영한다.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
